<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background-color: #f5f5f5; }
        h1 { color: #1F4E79; border-bottom: 3px solid #1F4E79; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 8px; margin: 6px 0 16px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #1F4E79; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #163a5f; }
        a { color: #1F4E79; }
    </style>
</head>
<body>
    <h1>Add New Product</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Product</button>
    </form>
    <br>
    <a href="/">← Back to Inventory</a>
</body>
</html>
