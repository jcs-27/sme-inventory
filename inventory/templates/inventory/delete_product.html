<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background-color: #f5f5f5; }
        h1 { color: #c0392b; border-bottom: 3px solid #c0392b; padding-bottom: 10px; }
        .warning { background-color: #fdf0ed; border: 1px solid #c0392b; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .btn-delete { background-color: #c0392b; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #1F4E79; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Delete Product</h1>
    <div class="warning">
        <p>Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>
        <p>This action cannot be undone.</p>
    </div>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Yes, Delete</button>
    </form>
    <br>
    <a href="/" class="btn-cancel">Cancel</a>
</body>
</html>
