<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — SME Inventory</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; background-color: #f5f5f5; }
        h1 { color: #1F4E79; border-bottom: 3px solid #1F4E79; padding-bottom: 10px; }
        input { width: 100%; padding: 8px; margin: 6px 0 16px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #1F4E79; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #163a5f; }
        .error { color: #c0392b; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>SME Inventory Login</h1>
    {% if form.errors %}
    <p class="error">Incorrect username or password. Please try again.</p>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" autofocus>
        <label>Password</label>
        <input type="password" name="password">
        <button type="submit">Login</button>
    </form>
</body>
</html>
